name: Visual Regression Tests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'

concurrency:
  group: visual-tests-${{ github.ref }}
  cancel-in-progress: false

jobs:
  visual-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - run: npx playwright install --with-deps chromium webkit
      - name: Run visual tests
        run: npx playwright test tests/visual/
        env:
          CI: 'true'
          BASE_URL: 'https://www.livguardsolar.com'
        continue-on-error: true
      - name: Run brain analysis
        run: npx ts-node brain/analyze.ts
        if: always()
      - name: Commit health files back to repo
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/run-history.ndjson reports/test-health.json
          git diff --staged --quiet || git commit -m "ci: update test health [skip ci]"
          git push
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ github.run_id }}
          path: reports/
          retention-days: 30
